<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            width: 260px;
            margin: 0;
            padding: 24px;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
        }
        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px auto;
            display: block;
            border-radius: 14px;
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
            object-fit: cover;
        }
        h2 {
            margin: 0 0 6px 0;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        p {
            margin: 0 0 24px 0;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #2dd4bf;
            border-color: #2dd4bf;
            color: #042f2e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(45, 212, 191, 0.25);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <img src="icon128.png" alt="Logo" class="logo">
    <h2>Auto Feedback</h2>
    <p>Instantly complete your current feedback form with positive responses.</p>
    <button id="fill">Auto Fill Form</button>
    <script src="popup.js"></script>
</body>
</html>
