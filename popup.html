<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            width: 300px;
            margin: 0;
            padding: 24px;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
        }
        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px auto;
            display: block;
            border-radius: 14px;
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.4);
            object-fit: cover;
        }
        h2 {
            margin: 0 0 6px 0;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        p {
            margin: 0 0 24px 0;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #2dd4bf;
            border-color: #2dd4bf;
            color: #042f2e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(45, 212, 191, 0.25);
        }
        button:active {
            transform: translateY(0);
        }
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .toggle-label {
            font-size: 13px;
            font-weight: 500;
            color: #f8fafc;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2dd4bf;
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }
        .shortcut-link {
            display: inline-block;
            margin-top: 16px;
            font-size: 12px;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .shortcut-link:hover {
            color: #94a3b8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <img src="icon128.png" alt="Logo" class="logo">
    <h2>Auto Feedback</h2>
    <p>Instantly complete your current feedback form with positive responses.</p>
    <button id="fill">Auto Fill Form</button>
    <div class="toggle-container">
        <span class="toggle-label">Enable Shortcut</span>
        <label class="switch">
            <input type="checkbox" id="shortcut-toggle" checked>
            <span class="slider"></span>
        </label>
    </div>
    <a href="#" id="configure-shortcut" class="shortcut-link">Configure Shortcut</a>
    <script src="popup.js"></script>
</body>
</html>
